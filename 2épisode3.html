  <div class="ecran" id="accueil">
    <div class="saison">SAISON 2 · ÉPISODE 3</div>
    <h1>Les Aventures d'Étincelle</h1>
    <h2>« L'enquête »</h2>

  <div class="ecran" id="fin">
    <h1>FIN DE L'ÉPISODE 3</h1>
    <p>Le méchant a un nom : le Dévoreur d'étoiles. 🟢<br>Et il devient de plus en plus puissant... À SUIVRE !</p>
    <button class="btn vert" id="rejouer">↻ Revoir l'épisode</button>
  </div>
</div>
<script>
const FILM = [
 {id:'c1', dur:60, subs:[
   [1,"Au matin, la ville se réveillait sans lumière ni entrain."],
   [11,"« Il faut découvrir qui commande ces sbires », dit Étincelle."],
   [22,"Hulotte le hibou hocha la tête : « Je connais un endroit. »"],
   [33,"« La Grande Bibliothèque des Étoiles, tout au bord du ciel. »"],
   [44,"« Là-bas sont gardés les souvenirs de toutes les nuits. »"],
   [53,"Et l'équipe s'envola vers l'horizon, décidée à savoir."]]},
 {id:'c2', dur:60, subs:[
   [1,"La bibliothèque flottait entre les nuages, immense et dorée."],
   [12,"Des milliers de livres-étoiles brillaient sur les étagères."],
   [23,"Hulotte feuilleta un vieux grimoire poussiéreux."],
   [34,"« Voilà... une ombre verte, il y a très, très longtemps. »"],
   [45,"« On l'appelait le Dévoreur. Il éteignait les étoiles. »"],
   [53,"« La Lune l'avait banni loin, tout au fond du ciel noir. »"]]},
 {id:'c3', dur:60, subs:[
   [1,"« Le Dévoreur... » répéta Étincelle, un frisson dans la voix."],
   [12,"« S'il est revenu, c'est qu'il a retrouvé sa force. »"],
   [23,"Soudain, un livre s'ouvrit seul, ses pages s'envolant."],
   [34,"Une image apparut : une main immense saisissant une étoile."],
   [45,"« Il ne vole pas la lumière... il la dévore pour grandir. »"],
   [53,"« Plus il en mange, plus il devient puissant », dit Hulotte."]]},
 {id:'c4', dur:60, subs:[
   [1,"Un bruit sec ! Les sbires avaient suivi l'équipe jusqu'ici."],
   [12,"Ils grimpaient sur les étagères, avides des livres-étoiles."],
   [23,"« Ils veulent les souvenirs ! Protégez la bibliothèque ! »"],
   [34,"Étincelle brilla, le chat griffa, Lueur fendit les rangs."],
   [45,"Hulotte serra le grimoire du Dévoreur contre lui : « Fuyons ! »"],
   [53,"Ils s'échappèrent de justesse, le livre précieux en main."]]},
 {id:'c5', dur:60, subs:[
   [1,"De retour sur les toits, ils examinèrent le grimoire."],
   [12,"Au fond du ciel, la lumière verte grandissait encore."],
   [23,"Et cette fois, on distinguait mieux sa forme immense..."],
   [34,"De longs bras d'ombre, une gueule pleine d'étoiles avalées."],
   [43,"« Bientôt, tout le ciel sera à moi », gronda le Dévoreur."],
   [51,"Ses deux yeux verts fixèrent l'équipe, au loin. Il souriait."],
   [57,"Comment arrêter un monstre pareil ?... À SUIVRE !"]]}
];
const scenes = FILM.map(s=>document.getElementById(s.id));
const stEl=document.getElementById('soustitre'), chEl=document.getElementById('chapitre'), barre=document.getElementById('barre');
const total=FILM.reduce((a,s)=>a+s.dur,0);
let idx=0,t=0,timer=null,pause=false;
function tic(){
  const sc=FILM[idx];
  scenes.forEach((el,i)=>el.classList.toggle('on',i===idx));
  chEl.textContent='CHAPITRE '+(idx+1)+' / '+FILM.length;
  let cur=''; for(const [ts,txt] of sc.subs){ if(t>=ts) cur=txt; }
  if(stEl.textContent!==cur){ stEl.textContent=cur; stEl.classList.remove('on'); void stEl.offsetWidth; stEl.classList.add('on'); }
  let ec=0; for(let i=0;i<idx;i++) ec+=FILM[i].dur; ec+=t;
  barre.style.width=(ec/total*100)+'%';
  t++;
  if(t>=sc.dur){ t=0; idx++; if(idx>=FILM.length){ fin(); return; } }
}
function demarrer(){ document.getElementById('accueil').style.display='none'; document.getElementById('fin').style.display='none'; idx=0;t=0;pause=false; clearInterval(timer); timer=setInterval(()=>{if(!pause)tic();},1000); tic(); }
function fin(){ clearInterval(timer); document.getElementById('fin').style.display='flex'; }
document.getElementById('play').onclick=demarrer;
document.getElementById('rejouer').onclick=demarrer;
document.getElementById('pausebtn').onclick=function(){ pause=!pause; this.textContent=pause?'▶':'⏸'; };
</script>
