.btn{background:linear-gradient(135deg,#ffd54a,#ff9a3a);color:#2d1b4e;border:none;padding:16px 48px;border-radius:40px;font-size:21px;font-weight:bold;cursor:pointer;box-shadow:0 6px 26px rgba(255,150,60,.5);transition:transform .15s}
.btn:active{transform:scale(.94)}

  <div class="ecran" id="accueil">
    <div class="saison">SAISON 2 · GRAND FINAL</div>
    <h1>Les Aventures d'Étincelle</h1>
    <h2>« L'Étoile du Premier Matin »</h2>
    <div class="duree">🌟 7 minutes · 7 chapitres · La bataille finale</div>

  <div class="ecran" id="fin">
    <h1>FIN DE LA SAISON 2 ⭐</h1>
    <p>Le Dévoreur est vaincu, l'aube s'est levée sur un monde sauvé. 🌅<br>Étincelle et ses amis ont réussi... ensemble. Merci d'avoir regardé !</p>
    <button class="btn or" id="rejouer">↻ Revoir le final</button>

<script>
const FILM = [
 {id:'e1', dur:60, subs:[
   [1,"La ville était plongée dans le noir. Le temps pressait."],
   [11,"« Direction le Mont de l'Aube », dit Étincelle, déterminée."],
   [22,"« Tout au bout du monde, là où naît la première lumière. »"],
   [33,"L'équipe vola par-delà les forêts, les mers et les brumes."],
   [44,"Enfin, une montagne de glace surgit, immense et scintillante."],
   [53,"« C'est là », souffla Hulotte. « Le sommet nous attend. »"]]},
 {id:'e2', dur:60, subs:[
   [1,"La montée fut glaciale. Le givre mordait à chaque pas."],
   [11,"Des vents de glace essayaient de les repousser en arrière."],
   [22,"Lueur ouvrit la voie, son croissant fendant la tempête."],
   [33,"Le chat glissa ! Hulotte le rattrapa d'un coup d'aile."],
   [44,"« Ne lâchez rien ! » cria Étincelle. « On y est presque ! »"],
   [53,"Et au sommet, enfin, une lumière douce les attendait."]]},
 {id:'e3', dur:60, subs:[
   [1,"Au cœur de la glace dormait l'Étoile du Premier Matin."],
   [12,"La toute première lumière, celle d'avant toutes les nuits."],
   [23,"Elle était petite, tiède, et battait comme un cœur."],
   [34,"« Elle est si fragile », murmura Étincelle, émerveillée."],
   [45,"« Réveille-toi », dit-elle doucement. « On a besoin de toi. »"],
   [53,"L'étoile s'éveilla, et une aube dorée baigna le sommet."]]},
 {id:'e4', dur:60, subs:[
   [1,"Mais au même instant, le ciel se déchira en vert."],
   [12,"Le Dévoreur les avait suivis jusqu'ici, furieux."],
   [23,"« Cette lumière est à MOI ! » rugit-il, gigantesque."],
   [34,"Il fondit sur eux, ses bras d'ombre balayant la montagne."],
   [45,"Étincelle serra l'Étoile du Matin contre son cœur."],
   [53,"« Non. Cette lumière n'appartient à personne. Elle nous unit. »"]]},
 {id:'e5', dur:60, subs:[
   [1,"La bataille finale éclata au sommet du monde."],
   [11,"Le chat, Lueur et Hulotte tenaient les sbires à distance."],
   [22,"Étincelle affrontait le Dévoreur, minuscule face au géant."],
   [33,"Il l'engloutit dans son ombre... tout devint noir."],
   [44,"« Étincelle ! » hurlèrent ses amis, le cœur brisé."],
   [53,"Mais au fond du noir, une petite lumière refusait de mourir."]]},
 {id:'e6', dur:60, subs:[
   [1,"Étincelle leva l'Étoile du Premier Matin au-dessus d'elle."],
   [12,"« Tu voulais toute la lumière ? La voici. TOUTE ENTIÈRE ! »"],
   [23,"L'Étoile explosa en une aube éblouissante, immense !"],
   [34,"Le Dévoreur hurla, aveuglé par la première lumière du monde."],
   [45,"Son ombre se fissura, s'effrita, puis se dissipa dans l'air."],
   [53,"« Je... ne voulais pas... être seul... » souffla-t-il en partant."]]},
 {id:'e7', dur:60, subs:[
   [1,"Le silence revint. Puis, une à une, les étoiles se rallumèrent."],
   [12,"La ville retrouva sa lumière, ses fenêtres, ses rêves."],
   [23,"L'Étoile du Premier Matin remonta au ciel, veiller sur tous."],
   [34,"Étincelle regarda ses amis : le chat, Lueur, Hulotte."],
   [45,"« On a réussi. Ensemble », sourit-elle, épuisée mais heureuse."],
   [53,"Et l'aube se leva sur un monde sauvé. FIN DE LA SAISON 2 ⭐"]]}
];
const scenes = FILM.map(s=>document.getElementById(s.id));
const stEl=document.getElementById('soustitre'), chEl=document.getElementById('chapitre'), barre=document.getElementById('barre');
const total=FILM.reduce((a,s)=>a+s.dur,0);
let idx=0,t=0,timer=null,pause=false;
function tic(){
  const sc=FILM[idx];
  scenes.forEach((el,i)=>el.classList.toggle('on',i===idx));
  chEl.textContent='CHAPITRE '+(idx+1)+' / '+FILM.length;
  let cur=''; for(const [ts,txt] of sc.subs){ if(t>=ts) cur=txt; }
  if(stEl.textContent!==cur){ stEl.textContent=cur; stEl.classList.remove('on'); void stEl.offsetWidth; stEl.classList.add('on'); }
  let ec=0; for(let i=0;i<idx;i++) ec+=FILM[i].dur; ec+=t;
  barre.style.width=(ec/total*100)+'%';
  t++;
  if(t>=sc.dur){ t=0; idx++; if(idx>=FILM.length){ fin(); return; } }
}
function demarrer(){ document.getElementById('accueil').style.display='none'; document.getElementById('fin').style.display='none'; idx=0;t=0;pause=false; clearInterval(timer); timer=setInterval(()=>{if(!pause)tic();},1000); tic(); }
function fin(){ clearInterval(timer); document.getElementById('fin').style.display='flex'; }
document.getElementById('play').onclick=demarrer;
document.getElementById('rejouer').onclick=demarrer;
document.getElementById('pausebtn').onclick=function(){ pause=!pause; this.textContent=pause?'▶':'⏸'; };
</script>
