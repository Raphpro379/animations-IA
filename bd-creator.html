<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créateur de BD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Comic Neue',cursive;background:#f5f0e8;display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:260px;background:#1a1a2e;color:white;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:3px solid #e94560;}
.tab{flex:1;padding:10px 4px;text-align:center;cursor:pointer;font-family:'Bangers',cursive;font-size:15px;letter-spacing:1px;color:#aaa;transition:all 0.1s;}
.tab.active{color:#f5c518;border-bottom:3px solid #f5c518;margin-bottom:-3px;}
.tab:hover{color:white;}
.sidebar-content{flex:1;overflow-y:auto;padding:10px;}

.section-title{font-family:'Bangers',cursive;font-size:13px;letter-spacing:2px;color:#f5c518;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(245,197,24,0.2);}

/* CHARACTER GRID */
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.char-item{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px;cursor:pointer;text-align:center;transition:all 0.12s;}
.char-item:hover{border-color:#f5c518;background:rgba(245,197,24,0.1);}
.char-item svg{display:block;margin:0 auto;}
.char-item span{font-size:10px;color:#aaa;display:block;margin-top:2px;}

/* BG GRID */
.bg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.bg-item{height:54px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all 0.12s;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(0,0,0,0.5);overflow:hidden;}
.bg-item:hover{border-color:#f5c518;transform:scale(1.03);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{background:white;border-bottom:3px solid #1a1a2e;padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.toolbar h1{font-family:'Bangers',cursive;font-size:22px;color:#e94560;letter-spacing:2px;text-shadow:2px 2px 0 #f5c518;margin-right:6px;}
button{font-family:'Bangers',cursive;font-size:14px;letter-spacing:1px;padding:6px 14px;border:2.5px solid #1a1a2e;border-radius:7px;cursor:pointer;transition:transform 0.1s;background:white;}
button:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 #1a1a2e;}
button:active{transform:none;box-shadow:none;}
.btn-y{background:#f5c518;}
.btn-g{background:#5dd8a4;}
.btn-r{background:#e94560;color:white;}

/* CANVAS */
.canvas-wrap{flex:1;overflow:auto;padding:20px;display:flex;justify-content:center;align-items:flex-start;}
.bd-page{width:640px;background:white;border:4px solid #1a1a2e;box-shadow:6px 6px 0 #e94560;padding:8px;display:flex;flex-direction:column;gap:6px;}

/* PANEL */
.panel{position:relative;border:3px solid #1a1a2e;min-height:170px;overflow:hidden;cursor:pointer;background:#f0e6d3;}
.panel.selected{border-color:#e94560;border-width:4px;}
.panel-inner{width:100%;min-height:170px;position:relative;}
.panel-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.panel-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ccc;font-size:12px;text-align:center;pointer-events:none;}
.panel-del{position:absolute;top:5px;right:5px;background:#e94560;color:white;border:2px solid #1a1a2e;border-radius:5px;font-size:11px;padding:2px 7px;cursor:pointer;font-family:'Bangers',cursive;z-index:30;letter-spacing:1px;}

/* ELEMENTS (chars, bubbles) */
.bd-el{position:absolute;cursor:move;user-select:none;z-index:10;}
.bd-el .el-del{position:absolute;top:-9px;right:-9px;width:18px;height:18px;background:#e94560;border:2px solid #1a1a2e;border-radius:50%;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;color:white;font-weight:700;z-index:20;}
.bd-el:hover .el-del{display:flex;}

/* BUBBLE */
.bubble{background:white;border:2.5px solid #1a1a2e;border-radius:16px;padding:7px 11px;font-family:'Comic Neue',cursive;font-weight:700;font-size:13px;color:#1a1a2e;max-width:160px;text-align:center;line-height:1.3;position:relative;}
.bubble::after{content:'';position:absolute;bottom:-13px;left:14px;border-left:9px solid transparent;border-right:4px solid transparent;border-top:13px solid #1a1a2e;}
.bubble::before{content:'';position:absolute;bottom:-10px;left:15px;border-left:8px solid transparent;border-right:3px solid transparent;border-top:10px solid white;z-index:1;}
.thought{background:white;border:2.5px solid #1a1a2e;border-radius:50%;padding:10px 14px;font-family:'Comic Neue',cursive;font-weight:700;font-size:13px;color:#1a1a2e;max-width:150px;text-align:center;line-height:1.3;}
.shout{background:#f5c518;border:2.5px solid #1a1a2e;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:13px;color:#e94560;text-align:center;padding:20px;}

/* BUBBLE PANEL */
.bubble-panel{background:white;border-top:3px solid #1a1a2e;padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.bubble-panel input{font-family:'Comic Neue',cursive;font-size:13px;border:2px solid #ccc;border-radius:6px;padding:5px 9px;flex:1;min-width:120px;}
.bubble-panel input:focus{outline:none;border-color:#e94560;}
.bubble-type-btn{font-size:11px;padding:5px 10px;border-radius:6px;}
.bubble-type-btn.active{background:#e94560;color:white;border-color:#c73652;}

/* RESIZE HANDLE */
.resize-handle{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:se-resize;z-index:25;}
.resize-handle::after{content:'';position:absolute;bottom:3px;right:3px;width:7px;height:7px;border-right:2px solid #1a1a2e;border-bottom:2px solid #1a1a2e;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-tabs">
    <div class="tab active" onclick="showTab('chars')">👤 Persos</div>
    <div class="tab" onclick="showTab('bgs')">🌄 Fonds</div>
  </div>
  <div class="sidebar-content" id="tab-chars">
    <div id="char-list"></div>
  </div>
  <div class="sidebar-content" id="tab-bgs" style="display:none;">
    <div id="bg-list"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="toolbar">
    <h1>📖 BD!</h1>
    <button class="btn-y" onclick="addPanel()">+ Case</button>
    <button class="btn-r" onclick="clearAll()">🗑 Effacer</button>
    <span style="font-size:11px;color:#999;font-family:'Comic Neue',cursive;">← Glisse persos/fonds sur une case</span>
  </div>

  <div class="canvas-wrap">
    <div class="bd-page" id="bd-page">
      <div id="placeholder" style="text-align:center;color:#ccc;padding:50px;font-size:13px;">Cliquez sur <b>+ Case</b> pour commencer !</div>
    </div>
  </div>

  <div class="bubble-panel">
    <span style="font-family:'Bangers',cursive;font-size:14px;letter-spacing:1px;color:#1a1a2e;">BULLE :</span>
    <input type="text" id="bubble-text" placeholder="Texte du dialogue..." />
    <button class="bubble-type-btn active" id="bt-speech" onclick="setBt('speech')">💬 Dialogue</button>
    <button class="bubble-type-btn" id="bt-thought" onclick="setBt('thought')">💭 Pensée</button>
    <button class="bubble-type-btn" id="bt-shout" onclick="setBt('shout')">💥 Cri</button>
    <button class="btn-g" onclick="addBubble()">+ Ajouter</button>
  </div>
</div>

// ── RENDER SIDEBAR ──
function renderChars() {
  const cats = [...new Set(CHARS.map(c => c.cat))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="section-title">${cat}</div><div class="char-grid">`;
    CHARS.filter(c => c.cat === cat).forEach((c, i) => {
      html += `<div class="char-item" draggable="true" data-char="${CHARS.indexOf(c)}" ondragstart="dragChar(event,${CHARS.indexOf(c)})" title="Cliquer ou glisser sur une case">
        ${c.svg}<span>${c.name}</span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('char-list').innerHTML = html;
}

function renderBGs() {
  let html = '<div class="section-title">Couleurs & textures</div><div class="bg-grid">';
  BGS.forEach((bg, i) => {
    if (bg.svg) return;
    html += `<div class="bg-item" style="${bg.style}" onclick="applyBG(${i})" title="${bg.name}">${bg.name}</div>`;
  });
  html += '</div><div class="section-title">Décors dessinés</div><div class="bg-grid">';
  BGS.forEach((bg, i) => {
    if (!bg.svg) return;
    html += `<div class="bg-item" style="background:#222;position:relative;overflow:hidden;" onclick="applyBG(${i})" title="${bg.name}">
      <div style="position:absolute;inset:0;">${bg.svg}</div>
      <span style="position:relative;z-index:1;color:white;text-shadow:1px 1px 2px #000;">${bg.name}</span>
    </div>`;
  });
  html += '</div>';
  document.getElementById('bg-list').innerHTML = html;
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='chars')||(i===1&&t==='bgs')));
  document.getElementById('tab-chars').style.display = t==='chars'?'':'none';
  document.getElementById('tab-bgs').style.display = t==='bgs'?'':'none';
}

// ── DRAG FROM SIDEBAR ──
function dragChar(e, idx) {
  e.dataTransfer.setData('charIdx', idx);
}

// ── PANEL ──
function addPanel() {
  document.getElementById('placeholder')?.remove();
  const panel = document.createElement('div');
  panel.className = 'panel';

  const inner = document.createElement('div');
  inner.className = 'panel-inner';
  inner.innerHTML = `<div class="panel-hint">Glisse un personnage ou un fond ici</div>`;
  panel.appendChild(inner);

  // Delete button
  const del = document.createElement('div');
  del.className = 'panel-del';
  del.textContent = '✕ Supprimer';
  del.onclick = e => { e.stopPropagation(); panel.remove(); if (selectedPanel===panel) selectedPanel=null; };
  inner.appendChild(del);

  // Click to select
  panel.addEventListener('click', e => {
    if (e.target.closest('.bd-el,.panel-del')) return;
    selectPanel(panel);
  });

  // Drop zone for chars & bgs
  panel.addEventListener('dragover', e => { e.preventDefault(); panel.style.outline='3px dashed #f5c518'; });
  panel.addEventListener('dragleave', () => { panel.style.outline=''; });
  panel.addEventListener('drop', e => {
    e.preventDefault();
    panel.style.outline='';
    const charIdx = e.dataTransfer.getData('charIdx');
    if (charIdx !== '') placeChar(panel, parseInt(charIdx));
  });

  document.getElementById('bd-page').appendChild(panel);
  selectPanel(panel);
}

function selectPanel(p) {
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('selected'));
  p.classList.add('selected');
  selectedPanel = p;
}

function placeChar(panel, idx) {
  selectPanel(panel);
  const char = CHARS[idx];
  const wrapper = document.createElement('div');
  wrapper.className = 'bd-el';
  wrapper.style.cssText = 'top:20px;left:20px;width:60px;height:90px;';
  wrapper.innerHTML = char.svg;

  const d = document.createElement('div');
  d.className = 'el-del';
  d.textContent = '×';
  d.onclick = e => { e.stopPropagation(); wrapper.remove(); };
  wrapper.appendChild(d);

  // Resize
  const rh = document.createElement('div');
  rh.className = 'resize-handle';
  rh.addEventListener('mousedown', e => {
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const startW = wrapper.offsetWidth, startH = wrapper.offsetHeight;
    const onMove = ev => {
      wrapper.style.width = Math.max(30, startW + ev.clientX - startX) + 'px';
      wrapper.style.height = Math.max(45, startH + ev.clientY - startY) + 'px';
      wrapper.querySelector('svg').setAttribute('width', wrapper.style.width);
      wrapper.querySelector('svg').setAttribute('height', wrapper.style.height);
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  wrapper.appendChild(rh);

  panel.querySelector('.panel-inner').appendChild(wrapper);
  makeDraggable(wrapper);
  panel.querySelector('.panel-hint').style.display = 'none';
}

function applyBG(idx) {
  if (!selectedPanel) { alert('Cliquez d\'abord sur une case !'); return; }
  const bg = BGS[idx];
  let bgDiv = selectedPanel.querySelector('.panel-bg');
  if (!bgDiv) {
    bgDiv = document.createElement('div');
    bgDiv.className = 'panel-bg';
    selectedPanel.querySelector('.panel-inner').prepend(bgDiv);
  }
  bgDiv.style.cssText = 'position:absolute;inset:0;';
  if (bg.svg) {
    bgDiv.innerHTML = bg.svg;
    bgDiv.style.background = '';
  } else {
    bgDiv.innerHTML = '';
    bgDiv.style.cssText += bg.style;
  }
  selectedPanel.querySelector('.panel-hint').style.display = 'none';
}

// ── BUBBLES ──
function setBt(t) {
  bubbleType = t;
  ['speech','thought','shout'].forEach(x => document.getElementById('bt-'+x).classList.toggle('active', x===t));
}

function addBubble() {
  if (!selectedPanel) { alert('Cliquez d\'abord sur une case !'); return; }
  const text = document.getElementById('bubble-text').value.trim() || '...';
  const wrap = document.createElement('div');
  wrap.className = 'bd-el';
  wrap.style.cssText = 'top:10px;left:10px;';

  const b = document.createElement('div');
  b.className = bubbleType==='speech' ? 'bubble' : bubbleType==='thought' ? 'thought' : 'shout';
  b.textContent = text;
  wrap.appendChild(b);

  const d = document.createElement('div');
  d.className = 'el-del';
  d.textContent = '×';
  d.onclick = e => { e.stopPropagation(); wrap.remove(); };
  wrap.appendChild(d);

  b.addEventListener('dblclick', e => {
    e.stopPropagation();
    const v = prompt('Modifier le texte :', b.textContent);
    if (v !== null) b.textContent = v;
  });

  selectedPanel.querySelector('.panel-inner').appendChild(wrap);
  document.getElementById('bubble-text').value = '';
  makeDraggable(wrap);
}

// ── DRAG (elements) ──
function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    if (e.target.closest('.el-del,.resize-handle')) return;
    e.stopPropagation();
    const r = el.getBoundingClientRect();
    drag = { el, ox: e.clientX - r.left, oy: e.clientY - r.top };
    el.style.zIndex = 50;
  });
}

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const pr = drag.el.offsetParent.getBoundingClientRect();
  drag.el.style.left = Math.max(0, e.clientX - pr.left - drag.ox) + 'px';
  drag.el.style.top = Math.max(0, e.clientY - pr.top - drag.oy) + 'px';
});
document.addEventListener('mouseup', () => { if (drag) { drag.el.style.zIndex = 10; drag = null; } });

// ── CLEAR ──
function clearAll() {
  if (confirm('Effacer toute la BD ?')) {
    document.getElementById('bd-page').innerHTML = '<div id="placeholder" style="text-align:center;color:#ccc;padding:50px;font-size:13px;">Cliquez sur <b>+ Case</b> pour commencer !</div>';
    selectedPanel = null;
  }
}

// ── INIT ──
renderChars();
renderBGs();
</script>
