<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chauve-souris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1838; }
  body { background: linear-gradient(to bottom, #2a2050 0%, #1a1838 60%, #3a2848 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 92vw; max-width: 500px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #c8a8e0; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<circle cx="300" cy="70" r="40" fill="#ffe08a"/><circle cx="288" cy="60" r="8" fill="#e0c070" opacity="0.5"/><circle cx="310" cy="80" r="6" fill="#e0c070" opacity="0.5"/>
<g fill="#ffffff"><circle cx="60" cy="50" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle><circle cx="140" cy="35" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle><circle cx="200" cy="60" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle><circle cx="90" cy="120" r="1"><animate attributeName="opacity" values="1;0.4;1" dur="2.7s" repeatCount="indefinite"/></circle></g>
<!-- petites chauves-souris au loin -->
<g fill="#1a1020" opacity="0.7"><g transform="translate(80 130)"><path d="M0 0 Q-8 -5 -13 0 Q-8 -1 -4 1 Q-2 -5 0 0 Q2 -5 4 1 Q8 -1 13 0 Q8 -5 0 0 Z"><animate attributeName="d" values="M0 0 Q-8 -5 -13 0 Q-8 -1 -4 1 Q-2 -5 0 0 Q2 -5 4 1 Q8 -1 13 0 Q8 -5 0 0 Z;M0 0 Q-8 1 -13 -3 Q-8 0 -4 1 Q-2 -4 0 0 Q2 -4 4 1 Q8 0 13 -3 Q8 1 0 0 Z;M0 0 Q-8 -5 -13 0 Q-8 -1 -4 1 Q-2 -5 0 0 Q2 -5 4 1 Q8 -1 13 0 Q8 -5 0 0 Z" dur="0.5s" repeatCount="indefinite"/></path><animateTransform attributeName="transform" type="translate" values="80 130;280 90;80 130" dur="14s" repeatCount="indefinite"/></g></g>
<g>
<animateTransform attributeName="transform" type="translate" values="0 -8; 0 8; 0 -8" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<!-- aile gauche -->
<g><animateTransform attributeName="transform" type="rotate" values="0 190 190; -18 190 190; 0 190 190" dur="0.6s" repeatCount="indefinite"/>
<path d="M190 190 Q140 165 110 175 Q125 185 118 195 Q140 190 150 200 Q160 192 170 202 Q178 194 190 200 Z" fill="#3a2848"/></g>
<!-- aile droite -->
<g><animateTransform attributeName="transform" type="rotate" values="0 190 190; 18 190 190; 0 190 190" dur="0.6s" repeatCount="indefinite"/>
<path d="M190 190 Q240 165 270 175 Q255 185 262 195 Q240 190 230 200 Q220 192 210 202 Q202 194 190 200 Z" fill="#3a2848"/></g>
<!-- corps -->
<ellipse cx="190" cy="192" rx="20" ry="26" fill="#2a1e38"/>
<!-- oreilles -->
<path d="M178 170 L172 152 L186 166 Z" fill="#2a1e38"/>
<path d="M202 170 L208 152 L194 166 Z" fill="#2a1e38"/>
<!-- tete -->
<circle cx="190" cy="178" r="18" fill="#3a2848"/>
<!-- yeux -->
<circle cx="183" cy="176" r="4.5" fill="#ffd24a"/><circle cx="197" cy="176" r="4.5" fill="#ffd24a"/>
<circle cx="183" cy="176" r="2" fill="#2e2e2e"/><circle cx="197" cy="176" r="2" fill="#2e2e2e"/>
<!-- sourire + crocs -->
<path d="M183 186 Q190 191 197 186" stroke="#1a1020" stroke-width="2" fill="none" stroke-linecap="round"/>
<polygon points="185,187 187,192 189,187" fill="#fff"/><polygon points="191,187 193,192 195,187" fill="#fff"/>
</g>
</svg>
<div id="hint">Ma chauve-souris 🦇</div>
</body>
</html>
