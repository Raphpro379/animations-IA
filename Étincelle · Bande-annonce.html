<title>Étincelle · Bande-annonce</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'Trebuchet MS','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
#tv{position:relative;width:100vw;height:100vh;max-width:900px;max-height:100vh;background:#000;overflow:hidden}

/* scènes */
.plan-scene{position:absolute;inset:0;opacity:0;transition:opacity .8s}
.plan-scene.on{opacity:1}
.plan-svg{width:100%;height:100%;display:block}

/* cartons de texte */
#carton{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;opacity:0;transition:opacity .8s;z-index:20}
#carton.on{opacity:1}
#carton .txt{color:#fff;font-size:clamp(20px,5vw,34px);line-height:1.4;font-weight:500;text-shadow:0 2px 20px rgba(0,0,0,.6);max-width:700px}
#carton .txt.big{font-family:'Georgia',serif;font-size:clamp(30px,8vw,54px);color:#ffe98a;text-shadow:0 0 30px rgba(255,213,74,.5)}
#carton .txt.titre{font-family:'Georgia',serif;font-size:clamp(28px,7.5vw,52px);color:#ffd54a;letter-spacing:2px;text-shadow:0 0 40px rgba(255,213,74,.6);animation:titrepop 1s ease-out}
#carton .txt.sous{font-size:clamp(16px,3.6vw,22px);color:#c0b0e0;letter-spacing:1px}
#carton .txt.vilain{color:#8affb0;font-style:italic;text-shadow:0 0 24px rgba(58,255,138,.4)}
@keyframes titrepop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* sous-titre des scènes (bas) */
#soustitre{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:88%;max-width:720px;text-align:center;color:#fff;font-size:clamp(15px,4vw,22px);text-shadow:0 2px 12px #000,0 0 24px #000;line-height:1.4;z-index:25;opacity:0;transition:opacity .5s}
#soustitre.on{opacity:1}

/* barre + son visuel */
#barre{position:absolute;bottom:0;left:0;height:4px;background:linear-gradient(90deg,#ffd54a,#c79cff,#3aff8a);width:0;z-index:30;transition:width .2s linear}

/* accueil / fin */
.ecran{position:absolute;inset:0;z-index:40;background:radial-gradient(circle at 50% 40%,#2d1b4e,#05050f);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.ecran .sous{color:#c79cff;letter-spacing:4px;font-size:13px;margin-bottom:14px;text-transform:uppercase}
.ecran h1{font-family:'Georgia',serif;color:#ffd54a;font-size:clamp(30px,8vw,56px);text-shadow:0 0 30px rgba(255,213,74,.5);margin-bottom:10px}
.ecran p{color:#e8c0ff;font-size:clamp(15px,3.6vw,19px);margin-bottom:30px}
.btn{background:linear-gradient(135deg,#ffd54a,#ff9a3a);color:#2d1b4e;border:none;padding:16px 46px;border-radius:40px;font-size:20px;font-weight:bold;cursor:pointer;box-shadow:0 6px 26px rgba(255,150,60,.5);transition:transform .15s}
.btn:active{transform:scale(.94)}
#fin{display:none}
.btn.viol{background:linear-gradient(135deg,#c79cff,#7a4adf);color:#fff}
#skip{position:absolute;top:14px;right:16px;z-index:35;background:rgba(0,0,0,.4);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:18px;padding:6px 14px;font-size:13px;cursor:pointer}
</style></head>

  <div id="barre"></div>
  <button id="skip" style="display:none">Passer ⏭</button>

  <div class="ecran" id="accueil">
    <div class="sous">Bande-annonce officielle</div>
    <h1>Les Aventures d'Étincelle</h1>
    <p>1 minute · Saison 1 &amp; 2</p>
    <button class="btn" id="play">▶ Lancer la bande-annonce</button>
  </div>

  <div class="ecran" id="fin">
    <div class="sous">Merci d'avoir regardé</div>
    <h1>✦ Étincelle ✦</h1>
    <p>Prêt(e) pour l'aventure ?</p>
    <button class="btn viol" id="rejouer">↺ Revoir la bande-annonce</button>
  </div>
</div>
<script>
const PLANS = [
 {t:'carton', dur:3.5, sub:"Dans un monde où les étoiles s'éteignent...", bg:"#05050f"},
 {t:'scene', id:'p_ciel', dur:4.5, sub:"une petite lumière refuse d'abandonner."},
 {t:'carton', dur:3, sub:"Voici Étincelle.", bg:"#0a0a24", big:true},
 {t:'scene', id:'p_etincelle', dur:4.5, sub:"La gardienne de la nuit."},
 {t:'scene', id:'p_amis', dur:5, sub:"Avec ses amis : le chat, Lueur, et Hulotte."},
 {t:'carton', dur:3, sub:"Mais les ténèbres se réveillent...", bg:"#0a1408"},
 {t:'scene', id:'p_sbires', dur:4.5, sub:"Des sbires envahissent le ciel."},
 {t:'scene', id:'p_devoreur', dur:5, sub:"Et un monstre veut dévorer toute la lumière."},
 {t:'carton', dur:3.5, sub:"« Bientôt, tout le ciel sera à moi. »", bg:"#04120a", vilain:true},
 {t:'scene', id:'p_bataille', dur:4.5, sub:"Une bataille pour sauver le monde va commencer."},
 {t:'carton', dur:3, sub:"Le courage. L'amitié. La lumière.", bg:"#1a0a24"},
 {t:'scene', id:'p_final', dur:5, sub:"Ensemble, ils peuvent tout affronter."},
 {t:'carton', dur:4, sub:"LES AVENTURES D'ÉTINCELLE", bg:"#0a0a2e", titre:true},
 {t:'carton', dur:3.5, sub:"Saison 1 & 2 · Disponibles maintenant", bg:"#0a0a2e", sous:true}
];
const total = PLANS.reduce((a,p)=>a+p.dur,0);
const carton=document.getElementById('carton'), cartonTxt=document.getElementById('carton-txt');
const stEl=document.getElementById('soustitre'), barre=document.getElementById('barre');
const scenes={};
document.querySelectorAll('.plan-scene').forEach(el=>scenes[el.id]=el);
let idx=0, timer=null, elapsed=0, playing=false;

function clearAll(){
  Object.values(scenes).forEach(s=>s.classList.remove('on'));
  carton.classList.remove('on');
  stEl.classList.remove('on');
}
function showPlan(i){
  clearAll();
  const p=PLANS[i];
  if(p.t==='carton'){
    document.getElementById('tv').style.background=p.bg||'#05050f';
    cartonTxt.textContent=p.sub;
    cartonTxt.className='txt'+(p.big?' big':'')+(p.titre?' titre':'')+(p.sous?' sous':'')+(p.vilain?' vilain':'');
    carton.style.background=p.bg||'#05050f';
    carton.classList.add('on');
  } else {
    const sc=scenes[p.id];
    if(sc) sc.classList.add('on');
    stEl.textContent=p.sub;
    stEl.classList.add('on');
  }
}
function tick(){
  if(!playing) return;
  elapsed += 0.1;
  barre.style.width=(elapsed/total*100)+'%';
  let acc=0, cur=0;
  for(let i=0;i<PLANS.length;i++){ if(elapsed>=acc){cur=i;} acc+=PLANS[i].dur; }
  if(cur!==idx){ idx=cur; showPlan(idx); }
  if(elapsed>=total){ finir(); }
}
function demarrer(){
  document.getElementById('accueil').style.display='none';
  document.getElementById('fin').style.display='none';
  document.getElementById('skip').style.display='block';
  idx=0; elapsed=0; playing=true;
  showPlan(0);
  clearInterval(timer); timer=setInterval(tick,100);
}
function finir(){
  clearInterval(timer); playing=false;
  clearAll();
  document.getElementById('skip').style.display='none';
  document.getElementById('tv').style.background='#000';
  document.getElementById('fin').style.display='flex';
}
document.getElementById('play').onclick=demarrer;
document.getElementById('rejouer').onclick=demarrer;
document.getElementById('skip').onclick=finir;
</script>
</body></html>
